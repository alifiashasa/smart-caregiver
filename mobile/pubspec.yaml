name: mobile
description: "Smart Caregiver — Caregiver Companion"
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  get_storage: ^2.1.1
  google_fonts: ^8.1.0
  get: ^4.7.3
  fl_chart: ^1.2.0
  image_picker: ^1.2.2
  cached_network_image: ^3.4.1
  http: ^1.2.0
  flutter_dotenv: ^5.2.1
  firebase_core: ^3.12.1
  firebase_messaging: ^15.2.4
  flutter_local_notifications: ^18.0.1
  flutter_secure_storage: ^10.3.1
  dio: ^5.9.2
  pretty_dio_logger: ^1.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.5
  fake_async: ^1.3.2

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/.env
